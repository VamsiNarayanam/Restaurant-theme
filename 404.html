<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="Page not found — Stackly · Ember &amp; Oak fine dining, Bangalore.">
  <meta name="theme-color" content="#0C0A09">
  <title>404 — Stackly · Ember &amp; Oak</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/premium.css">
  <link rel="stylesheet" href="css/premium-responsive.css">
</head>
<body class="page-inner page-error page-hero-overlay premium-theme">

  <div id="preloader" aria-hidden="true">
    <div class="preloader__stage">
      <div class="preloader__ring" aria-hidden="true"><span class="preloader__ring-arc"></span></div>
      <img class="preloader__logo" src="images/stackly-restaurant-logo.webp" alt="Stackly · Ember &amp; Oak" width="220" height="48" decoding="async">
      <div class="preloader__progress" role="progressbar" aria-label="Loading" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
        <span class="preloader__progress-fill"></span>
      </div>
      <p class="preloader__tagline">Finding your table…</p>
    </div>
  </div>


  <main class="site-main">
    <section class="error-page error-page--premium" aria-labelledby="error-title">
      <div class="error-page__bg" aria-hidden="true">
        <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=2400&q=90" alt="" width="1920" height="1080" decoding="async">
      </div>
      <div class="container error-page__container">
        <div class="error-page__card glass-card">
      
          <p class="error-page__code" aria-hidden="true">404</p>
          <h1 id="error-title">This table isn't available.</h1>
          <p class="lead">The page you're looking for may have moved—or the reservation has already been seated.</p>
          <div class="error-page__actions">
            <button type="button" class="btn btn--outline-light" id="error-go-back" data-go-back>Go back</button>
            <a class="btn btn--primary" href="index.html">Back to home</a>
          </div>
       
        </div>
      </div>
    </section>
  </main>


  <script src="js/main.js"></script>
</body>
</html>
